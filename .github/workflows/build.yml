name: CEIA Frota — Build Multi-Plataforma

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python (node-gyp — Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configurar node-gyp + Visual Studio (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          npm config set msvs_version 2022
          npm config set python python

      - name: Instalar dependências
        run: npm install

      - name: Sincronizar versão com a tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Build
        run: node build.mjs
        env:
          CI: true

      - name: Publicar — Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run electron:build -- --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar — Windows
        if: matrix.os == 'windows-latest'
        run: npm run electron:build -- --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar — Mac
        if: matrix.os == 'macos-latest'
        run: npm run electron:build -- --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
