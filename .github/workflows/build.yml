name: CEIA Frota — Build Multi-Plataforma

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python (node-gyp — Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-

      - name: Instalar dependências
        run: npm install || npm install || npm install
        env:
          GYP_MSVS_VERSION: 2022

      - name: Sincronizar versão com a tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Build
        run: node build.mjs
        env:
          CI: true

      - name: Publicar — Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run electron:build -- --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: true

      - name: Publicar — Windows
        if: matrix.os == 'windows-latest'
        run: npm run electron:build -- --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar — Mac
        if: matrix.os == 'macos-latest'
        run: npm run electron:build -- --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
